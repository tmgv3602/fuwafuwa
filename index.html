<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>きつねさんといちご大福</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;overflow:hidden;background:#16183a;
    touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;font-family:"DotGothic16",monospace;}
  #stage{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
  .btn{position:absolute;z-index:6;pointer-events:auto;border:2px solid rgba(243,236,217,.5);
    cursor:pointer;background:rgba(22,24,58,.45);color:#f3ecd9;
    width:40px;height:40px;display:grid;place-items:center;font-size:16px;line-height:1;
    transition:transform .1s,opacity .5s;border-radius:0}
  .btn:active{transform:scale(.9)}
  #mute{top:max(12px,env(safe-area-inset-top));right:14px}
  #hint{position:absolute;inset:0;display:grid;place-items:center;text-align:center;z-index:4;
    pointer-events:none;transition:opacity 1.1s ease;padding:0 26px;color:#ffffff}
  #hint .card{font-size:clamp(13px,3.9vw,18px);line-height:1.95;
    text-shadow:-2px -2px 0 #16183a,2px -2px 0 #16183a,-2px 2px 0 #16183a,2px 2px 0 #16183a,0 -2px 0 #16183a,0 2px 0 #16183a,-2px 0 0 #16183a,2px 0 0 #16183a}
  #hint .sub{font-size:.82em;color:#e3ebf4;opacity:1;display:block;margin-top:7px}
  .gone{opacity:0!important}
</style>
</head>

<div id="safeProbe" style="position:fixed;top:0;left:0;width:0;height:env(safe-area-inset-top);pointer-events:none"></div>

const PAL=["#16183a","#23275c","#3b4a8c","#5a86c4","#7fb8e6","#a9dcf2","#f0a36a","#ef89a0",
           "#f3ecd9","#aeb9cf","#d83b4f","#ff9bb0","#ffe08a","#ffffff","#e7a23a","#2f2733"];
function P(i){return PAL[i];}
function hexRGB(h){h=h.replace("#","");return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
const PAL_RGB=PAL.map(hexRGB);
function snapPal(c){let bi=0,bd=1e9;for(let i=0;i<PAL_RGB.length;i++){const p=PAL_RGB[i];const d=(c[0]-p[0])**2+(c[1]-p[1])**2+(c[2]-p[2])**2;if(d<bd){bd=d;bi=i;}}return PAL_RGB[bi];}

const CYCLE=200; let phase=0.42;
const NIGHT=[[22,24,58],[35,39,92],[59,74,140]];
const DAY=[[127,184,230],[150,205,235],[169,220,242]];
const WARM=[240,140,110];
function skyStop(i,dayMix,tw){
  const base=[lerp(NIGHT[i][0],DAY[i][0],dayMix),lerp(NIGHT[i][1],DAY[i][1],dayMix),lerp(NIGHT[i][2],DAY[i][2],dayMix)];
  const wa=tw*(i===0?0.12:i===1?0.5:0.82);
  return snapPal([lerp(base[0],WARM[0],wa),lerp(base[1],WARM[1],wa),lerp(base[2],WARM[2],wa)]);
}
function celestial(){
  const a=phase*Math.PI*2-Math.PI/2, elev=Math.sin(a);
  const cx=VW*0.5, cy=VH*1.18, R=VH*1.05;
  return {elev,
    sun:{x:Math.round(cx+R*Math.cos(a)), y:Math.round(cy-R*Math.sin(a)), up:elev>-0.02},
    moon:{x:Math.round(cx+R*Math.cos(a+Math.PI)), y:Math.round(cy-R*Math.sin(a+Math.PI)), up:Math.sin(a+Math.PI)>-0.02}};
}
let skyCache=null, skyKey=-999, skyNight=0, dirtySky=true;
function buildSky(){
  const c=celestial(), elev=c.elev;
  const dayMix=smooth((elev+0.18)/0.4), tw=clamp(1-Math.abs(elev)/0.26,0,1);
  const s0=skyStop(0,dayMix,tw), s1=skyStop(1,dayMix,tw), s2=skyStop(2,dayMix,tw);
  const img=vctx.createImageData(VW,VH), d=img.data;
  for(let y=0;y<VH;y++){
    const t=y/(VH-1); let a,b,f;
    if(t<0.5){a=s0;b=s1;f=t/0.5;} else {a=s1;b=s2;f=(t-0.5)/0.5;}
    const r=Math.round(a[0]+(b[0]-a[0])*f), g=Math.round(a[1]+(b[1]-a[1])*f), bb=Math.round(a[2]+(b[2]-a[2])*f);
    for(let x=0;x<VW;x++){ const i=(y*VW+x)*4; d[i]=r;d[i+1]=g;d[i+2]=bb;d[i+3]=255; }
  }
  skyCache=img; skyNight=clamp(1-dayMix*1.6,0,1);
}

function drawStars(t){ if(skyNight<0.06)return; for(const s of stars){const tw=reduce?0.8:Math.sin(t*s.sp+s.ph); if(tw>0.15) px(s.x,s.y, tw>0.72?P(13):P(8));} }

function drawMoon(c){ disc(c.moon.x,c.moon.y,5,P(8)); px(c.moon.x-2,c.moon.y-1,P(9)); px(c.moon.x+1,c.moon.y+1,P(9)); px(c.moon.x+2,c.moon.y-2,P(9)); }
function drawCloud(x,y,s){const w=P(8);x=Math.round(x);y=Math.round(y);disc(x,y,Math.round(4*s),w);disc(x+Math.round(5*s),y+1,Math.round(5*s),w);disc(x+Math.round(10*s),y,Math.round(4*s),w);disc(x+Math.round(5*s),y-Math.round(2*s),Math.round(4*s),w);}

function drawUI(){

  const SH=2;

    ctx.fillText(s,x-SH,y-SH); ctx.fillText(s,x+SH,y+SH); ctx.fillText(s,x-SH,y+SH); ctx.fillText(s,x+SH,y-SH);
    ctx.fillStyle=col; ctx.fillText(s,x,y); }
  const ty=safeTop+10, ih=24; let lx=10;
  if(DFH_IMG.complete&&DFH_IMG.naturalWidth){ const iw=Math.round(ih*DFH_W/DFH_H); ctx.drawImage(DFH_IMG,10,ty,iw,ih); lx=10+iw+7; }
  ctx.font='20px "DotGothic16",monospace'; ctx.textAlign="left"; T(collected+"/"+CONFIG.targetCount, lx, ty+ih/2, P(8));
  ctx.textAlign="center"; const ssc=1+comboPulse*0.16; ctx.font=Math.round(28*ssc)+'px "DotGothic16",monospace';
  T(String(score), cssW/2, ty+ih/2, P(13));
  if(combo>=2 && !result.on){                    // 大きな倍率（色が上がる・獲得で弾む）＋残りゲージ
    const tier = mult>=8?P(10):mult>=6?P(12):mult>=4?P(11):mult>=3?P(14):P(5);
    const my=ty+ih+30, sc=1+comboPulse*0.6;
    ctx.font=Math.round(34*sc)+'px "DotGothic16",monospace'; T("×"+mult, cssW/2, my, tier);
    const bw=96, bh=7, bx=cssW/2-bw/2, by=my+22, f=clamp(comboTimer/CONFIG.comboWindow,0,1);
    ctx.fillStyle="rgba(22,24,58,.6)"; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
    ctx.fillStyle="rgba(243,236,217,.28)"; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=tier; ctx.fillRect(bx,by,Math.round(bw*f),bh);
    ctx.font='14px "DotGothic16",monospace'; T(combo+" コンボ", cssW/2, by+18, P(8));
  }
  { const sx=cssW/VW, syy=cssH/VH;               // 獲得スコアのポップアップ
    for(const u of popups){ ctx.globalAlpha=clamp(u.t,0,1);
      const col=u.mult>=8?P(10):u.mult>=6?P(12):u.mult>=4?P(11):u.mult>=2?P(13):P(8);
      ctx.font=Math.round(13+u.mult*1.8)+'px "DotGothic16",monospace'; ctx.textAlign="center"; ctx.textBaseline="middle";
      const lbl="+"+u.pts, w2=ctx.measureText(lbl).width/2+SH+2;
      T(lbl, clamp(u.x*sx,w2,cssW-w2), u.y*syy, col);
    }
    ctx.globalAlpha=1;
  }
  if(result.on && result.geom && result.geom.o>0.9){
    const g=result.geom, sy=cssH/VH, cx=cssW/2, top=(g.cy-g.phF/2)*sy, ph=g.phF*sy;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font=Math.round(ph*0.34)+'px "DotGothic16",monospace'; T(result.rank.label, cx, top+ph*0.31, rankColor(result.rank.idx));
    ctx.font='20px "DotGothic16",monospace'; T(String(result.score), cx, top+ph*0.59, P(13));
    if(result.newBest){ ctx.font='13px "DotGothic16",monospace'; T("★ NEW BEST ★", cx, top+ph*0.75, P(12)); }
    else { ctx.font='13px "DotGothic16",monospace'; T("BEST "+best, cx, top+ph*0.75, P(9)); }
    ctx.font='12px "DotGothic16",monospace'; T("タップでもう一度", cx, top+ph*0.90, P(9));
  }
  ctx.setTransform(1,0,0,1,0,0);
}

let actx=null,master=null,muted=false;
function audioInit(){ if(actx)return; try{ actx=new (window.AudioContext||window.webkitAudioContext)(); master=actx.createGain(); master.gain.value=muted?0:0.65; master.connect(actx.destination);}catch(e){actx=null;} }
function tone(freq,dur,type,vol,glide){ if(!actx||muted)return; const o=actx.createOscillator(),g=actx.createGain(); o.type=type||"square"; o.frequency.value=freq; if(glide)o.frequency.linearRampToValueAtTime(glide,actx.currentTime+dur*0.6); g.gain.value=0; g.gain.linearRampToValueAtTime(vol||0.05,actx.currentTime+0.01); g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur); o.connect(g); g.connect(master); o.start(); o.stop(actx.currentTime+dur+0.02); }
function sndFlap(){ tone(330,0.10,"square",0.10,460); }
const PENTA=[0,2,4,7,9];
function comboNote(n){ const i=Math.min(n,18)-1, oct=Math.floor(i/PENTA.length), deg=PENTA[i%PENTA.length]; return 523.25*Math.pow(2,(deg+oct*12)/12); }
function sndCombo(n){ if(!actx||muted)return; const f=comboNote(n); tone(f,0.12,"square",0.18); if(n>=5) setTimeout(()=>tone(f*2,0.07,"triangle",0.10),28); }
function sndClear(){ [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,0.16,"square",0.16),i*95)); }

/* ===== BGM（手続き的チップチューン・8小節ループ／外部音源なし） ===== */
let bgmGain=null,PULSE25=null,PULSE12=null,bgmOn=false,bgmIdx=0,bgmLoopT=0,bgmTimer=null;
const mf=m=>440*Math.pow(2,(m-69)/12);
function makePulse(duty){ const n=20,re=new Float32Array(n),im=new Float32Array(n); for(let i=1;i<n;i++) im[i]=(2/(i*Math.PI))*Math.sin(i*Math.PI*duty); return actx.createPeriodicWave(re,im); }
const BPM=104,SPB=60/BPM,LOOP=8*4*SPB;
const PROG=[ {arp:[65,69,72],bass:41},{arp:[67,71,74],bass:43},{arp:[64,67,71],bass:40},{arp:[69,72,76],bass:45},
             {arp:[65,69,72],bass:41},{arp:[67,71,74],bass:43},{arp:[60,64,67],bass:36},{arp:[60,64,67],bass:48} ];
const MELODY=[ {b:0,m:72,d:1},{b:1,m:77,d:1},{b:2,m:81,d:2},{b:4,m:79,d:1.5},{b:5.5,m:74,d:.5},{b:6,m:79,d:2},
  {b:8,m:76,d:1},{b:9,m:79,d:2},{b:11,m:76,d:1},{b:12,m:81,d:1},{b:13,m:84,d:1},{b:14,m:81,d:2},
  {b:16,m:84,d:2},{b:18,m:81,d:1},{b:19,m:77,d:1},{b:20,m:79,d:1},{b:21,m:81,d:1},{b:22,m:83,d:2},
  {b:24,m:84,d:1},{b:25,m:79,d:1},{b:26,m:76,d:1},{b:27,m:72,d:1},{b:28,m:72,d:3} ];
const BGM_EV=(function(){ const e=[],ap=[0,1,2,1];
  for(let bi=0;bi<8;bi++){ const c=PROG[bi];
    for(let k=0;k<8;k++){ const beat=bi*4+k*0.5; e.push({t:beat*SPB,m:c.arp[ap[k%4]],d:0.5*SPB*0.9,ch:"arp"}); }
    e.push({t:(bi*4)*SPB,m:c.bass,d:1.6*SPB,ch:"bass"}); e.push({t:(bi*4+2)*SPB,m:c.bass,d:1.6*SPB,ch:"bass"});
  }
  for(const n of MELODY) e.push({t:n.b*SPB,m:n.m,d:n.d*SPB,ch:"mel"});
  return e.sort((a,b)=>a.t-b.t);
})();
function bgmNote(t,ev){ const o=actx.createOscillator(),g=actx.createGain(); let peak;
  if(ev.ch==="mel"){ o.setPeriodicWave(PULSE25); peak=0.24; }
  else if(ev.ch==="arp"){ o.setPeriodicWave(PULSE12); peak=0.09; }
  else { o.type="triangle"; peak=0.17; }
  o.frequency.value=mf(ev.m); const end=t+ev.d;
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(peak,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,end);
  o.connect(g); g.connect(bgmGain); o.start(t); o.stop(end+0.03);
}
function bgmSchedule(){ if(!bgmOn||!actx)return; const ahead=actx.currentTime+0.12; let guard=0;
  while(guard++<256){ if(bgmIdx>=BGM_EV.length){ bgmIdx=0; bgmLoopT+=LOOP; } const ev=BGM_EV[bgmIdx], t=bgmLoopT+ev.t; if(t>ahead)break; bgmNote(t,ev); bgmIdx++; } }
function startBGM(){ if(!actx||bgmOn)return; if(!PULSE25){PULSE25=makePulse(0.25);PULSE12=makePulse(0.125);}
  bgmGain=actx.createGain(); bgmGain.gain.value=1.0; bgmGain.connect(master);
  bgmOn=true; bgmIdx=0; bgmLoopT=actx.currentTime+0.12; bgmSchedule(); bgmTimer=setInterval(bgmSchedule,25); }

/* ===== 入力 ===== */
let flapSndTimer=0;
function onDown(e){ e.preventDefault(); audioInit(); if(actx&&actx.state==="suspended")actx.resume(); startBGM();
  try{cv.setPointerCapture(e.pointerId);}catch(_){}
  if(result.on && result.t>0.7){ restart(); return; }     // 結果画面はタップでリトライ（はばたかない）
  pointer.active=true; pointer.id=e.pointerId; pointer.x=e.clientX; pointer.y=e.clientY; pointer.flapQueued=true;
  flapSndTimer=0; sndFlap(); fadeHint();
  if(!run.started && !run.done){ run.started=true; }
}
function onMove(e){ if(pointer.active&&e.pointerId===pointer.id){pointer.x=e.clientX;pointer.y=e.clientY;} }
function onUp(e){ if(e.pointerId===pointer.id){pointer.active=false;pointer.id=null;} }
cv.addEventListener("pointerdown",onDown); cv.addEventListener("pointermove",onMove);
cv.addEventListener("pointerup",onUp); cv.addEventListener("pointercancel",onUp);
function fadeHint(){ interactions++; if(!hintFading&&interactions>=2){hintFading=true;document.getElementById("hint").classList.add("gone");} }

/* ===== 物理 ===== */
function physics(){
  let doFlap=false, steer=0;
  if(pointer.active){ doFlap=true; flapSndTimer++; if(flapSndTimer>=10){sndFlap();flapSndTimer=0;} }
  else { flapSndTimer=0; if(pointer.flapQueued){doFlap=true;pointer.flapQueued=false;} }
  if(pointer.active||doFlap){ const gx=pointer.x*SX, bx=ball.x/SUB; if(gx<bx-2)steer=-1; else if(gx>bx+2)steer=1; }
  if(doFlap&&steer!==0) ball.vx+=HACC*steer;
  if(doFlap) ball.vy-=FLAP;
  ball.vy+=GRAV;
  ball.vx=clamp(ball.vx,-VMAX,VMAX); ball.vy=clamp(ball.vy,-VMAX,VMAX);
  ball.x+=ball.vx; ball.y+=ball.vy;
  if(ball.vx>8) ball.dir=1; else if(ball.vx<-8) ball.dir=-1;
  const sideL=(FOX_W/2+2)*SUB, sideR=(VW-FOX_W/2-2)*SUB;      // 両端で柔らかく跳ね返す＋2px余白
  if(ball.x<sideL){ ball.x=sideL; if(ball.vx<0)ball.vx=(-ball.vx*0.3)|0; }
  else if(ball.x>sideR){ ball.x=sideR; if(ball.vx>0)ball.vx=(-ball.vx*0.3)|0; }
  const top=10*SUB; if(ball.y<top){ball.y=top; if(ball.vy<0)ball.vy=(-ball.vy*0.2)|0;}
  const floor=horizonY*SUB; if(ball.y>floor){ball.y=floor; if(ball.vy>0)ball.vy=(-ball.vy*0.18)|0;}

  const bx=ball.x/SUB, by=ball.y/SUB;
  if(!result.on){
    const LM=14, RM=VW-14, TOPM=16, BOTM=horizonY-12;
    for(let i=items.length-1;i>=0;i--){ const it=items[i];
      it.dvx+=(Math.random()-0.5)*0.03; it.dvy+=(Math.random()-0.5)*0.03;   // ゆるやかに漂う（逃げない）
      it.dvx*=0.97; it.dvy*=0.97;
      const sp=Math.sqrt(it.dvx*it.dvx+it.dvy*it.dvy); if(sp>0.35){ it.dvx=it.dvx/sp*0.35; it.dvy=it.dvy/sp*0.35; }
      it.x+=it.dvx; it.y+=it.dvy;
      if(it.x<LM){ it.x=LM; it.dvx=Math.abs(it.dvx); } else if(it.x>RM){ it.x=RM; it.dvx=-Math.abs(it.dvx); }
      if(it.y<TOPM){ it.y=TOPM; it.dvy=Math.abs(it.dvy); } else if(it.y>BOTM){ it.y=BOTM; it.dvy=-Math.abs(it.dvy); }
      if(run.started && (bx-it.x)*(bx-it.x)+(by-it.y)*(by-it.y)<16*16){ items.splice(i,1); onCollect(it.x,it.y); }
    }
  }
  for(let i=sparks.length-1;i>=0;i--){ const s=sparks[i]; s.x+=s.vx; s.y+=s.vy; s.vy+=0.04; s.life-=0.04; if(s.life<=0)sparks.splice(i,1); }
  for(let i=petals.length-1;i>=0;i--){ const p=petals[i]; p.x+=p.vx; p.y+=p.vy; if(p.x<2){p.x=2;p.vx=Math.abs(p.vx);} else if(p.x>VW-5){p.x=VW-5;p.vx=-Math.abs(p.vx);} if(p.y>VH+4)petals.splice(i,1); }
}
function burst(x,y){ for(let i=0;i<12;i++){const a=Math.random()*6.28,sp=Math.random()*0.7+0.35; sparks.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.3,life:1});} }
function spawnDaifuku(){
  if(items.length>=5) return;
  const bx=ball.x/SUB, by=ball.y/SUB;
  const LM=14, RM=VW-14, TM=VH*0.10, BM=VH*0.66;
  function mk(x,y){ items.push({x:clamp(x,LM,RM),y:clamp(y,TM,BM),dvx:(Math.random()-0.5)*0.3,dvy:(Math.random()-0.5)*0.3,bob:Math.random()*6.28}); }
  if(items.length===0){                            // 最初の1個：ランダムにシード（キツネから少し離す）
    for(let t=0;t<10;t++){ const x=LM+Math.random()*(RM-LM), y=TM+Math.random()*(BM-TM);
      if((x-bx)*(x-bx)+(y-by)*(y-by)>30*30){ mk(x,y); return; } }
    mk((bx<VW/2)?RM:LM, TM+Math.random()*(BM-TM)); return;
  }
  const a=items[(Math.random()*items.length)|0];   // 既存のどれかを起点に“近く”へ → 塊ができる
  const R0=CONFIG.spawnReach[0], R1=CONFIG.spawnReach[1];
  for(let t=0;t<12;t++){
    const ang=Math.random()*6.2832, d=R0+Math.random()*(R1-R0);
    const x=a.x+Math.cos(ang)*d, y=a.y+Math.sin(ang)*d;   // 画面内＆キツネ即取り防止のみ（塊はOK）
    if(x>=LM&&x<=RM&&y>=TM&&y<=BM && (x-bx)*(x-bx)+(y-by)*(y-by)>20*20){ mk(x,y); return; }
  }
  mk(a.x+(Math.random()-0.5)*R1, a.y+(Math.random()-0.5)*R1);   // はみ出し続けたら起点近傍へ
}
function maybeSpawn(dt){ if(result.on||run.done)return; spawnCd-=dt;
  if(items.length<4 && spawnCd<=0){ spawnDaifuku(); spawnCd=220; }
  else if(items.length<5 && spawnCd<=0 && Math.random()<0.02*(dt/16.7)){ spawnDaifuku(); spawnCd=320; } }

function onCollect(x,y){
  burst(x,y);
  collected++; combo++; comboTimer=CONFIG.comboWindow;
  mult=Math.min(1+(combo>>1),8);
  const pts=100*mult; score+=pts;
  popups.push({x:x,y:y,t:1,mult:mult,pts:pts});
  comboPulse=1;
  sndCombo(combo);
  if(collected>=CONFIG.targetCount) tripEnd();
}
function tripEnd(){
  run.done=true; run.started=false; result.on=true; result.t=0; result.score=score;
  let idx=CONFIG.ranks.length-1;
  for(let i=0;i<CONFIG.ranks.length;i++){ if(score>=CONFIG.ranks[i].s){ idx=i; break; } }
  result.rank={label:CONFIG.ranks[idx].label, idx:idx};
  result.newBest = score>best; if(result.newBest){ best=score; saveBest(best); }
  const cols=[P(11),P(12),P(13),P(7),P(14),P(8)];
  for(let i=0;i<28;i++) petals.push({x:2+Math.random()*(VW-7), y:-Math.random()*24, vx:(Math.random()-0.5)*0.5, vy:0.35+Math.random()*0.55, s:(Math.random()<.5?2:3), col:cols[(Math.random()*cols.length)|0]});
  sndClear();
  hintFading=true; const h=document.getElementById("hint"); if(h)h.classList.add("gone");
}
function restart(){
  collected=0; score=0; combo=0; mult=1; comboTimer=0;
  items.length=0; sparks.length=0; petals.length=0; spawnCd=0;
  result.on=false; result.t=0; run.started=false; run.done=false;
  resetBall(); for(let i=0;i<3;i++) spawnDaifuku();
}

/* ===== ループ ===== */
let last=performance.now(),acc=0,paused=false;
function frame(now){
  requestAnimationFrame(frame);
  const iw=window.innerWidth||0, ih=window.innerHeight||0;
  if(iw>0&&ih>0&&(Math.abs(iw-cssW)>1||Math.abs(ih-cssH)>1)) resize();
  if(paused){ last=now; return; }
  let dt=now-last; last=now; if(dt>250)dt=250; acc+=dt;
  let steps=0; while(acc>=DT&&steps<6){ physics(); acc-=DT; steps++; } if(acc>DT)acc=0;

  const tsec=now/1000;
  if(run.started&&!run.done&&comboTimer>0){ comboTimer-=dt/1000; if(comboTimer<=0){ combo=0; mult=1; comboTimer=0; } }
  for(let i=popups.length-1;i>=0;i--){ const u=popups[i]; u.t-=dt/800; u.y-=dt*0.018; if(u.t<=0)popups.splice(i,1); }
  if(comboPulse>0) comboPulse=Math.max(0,comboPulse-dt/170);
  phase=(phase+dt/1000/CYCLE)%1; advanceFox(dt); maybeSpawn(dt);
  for(const c of clouds){ c.x+=c.sp*(reduce?0.3:1)*(dt/16.7); const lo=Math.ceil(4*c.s)+2, hi=VW-Math.ceil(14*c.s)-2; if(hi<=lo){c.x=(lo+hi)/2;} else if(c.x<lo){c.x=lo;c.sp=Math.abs(c.sp);} else if(c.x>hi){c.x=hi;c.sp=-Math.abs(c.sp);} }

  const key=Math.floor(phase*60);
  if(key!==skyKey||dirtySky){ buildSky(); skyKey=key; dirtySky=false; }

  vctx.putImageData(skyCache,0,0);
  drawStars(tsec);
  const c=celestial();
  if(c.moon.up) drawMoon(c);
  if(c.sun.up) drawSun(c);
  for(const cl of clouds) drawCloud(cl.x,cl.y,cl.s);
  drawBank();
  drawItems(tsec);
  drawSparks();
  drawFox();
  drawPetals();
  if(result.on){ result.t+=dt/1000; drawResultBox(); }

  ctx.setTransform(1,0,0,1,0,0); ctx.imageSmoothingEnabled=false;
  ctx.drawImage(vbuf,0,0,VW,VH,0,0,cv.width,cv.height);
  drawUI();
}
document.addEventListener("visibilitychange",()=>{ paused=document.hidden; last=performance.now(); });

document.getElementById("mute").addEventListener("click",e=>{ e.stopPropagation(); muted=!muted; if(master)master.gain.value=muted?0:0.65; e.currentTarget.textContent=muted?"×":"♪"; });

/* ===== 起動 ===== */
resize(); resetBall();
for(let i=0;i<3;i++) spawnDaifuku();
setTimeout(()=>{if(!hintFading)document.getElementById("hint").style.opacity="0.5";},6000);
requestAnimationFrame(frame);
</script>
</body>
